  <text x="166" y="184" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff">PM</text>
  <text x="120" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#10251d">Rev. Professor</text>
  <text x="120" y="415" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#10251d">Peter Mageto</text>
